services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: ai-pr-reviewer
      PGDATA: /var/lib/postgresql/data_18
    volumes:
      - pgdata:/var/lib/postgresql/data_18

volumes:
  pgdata:
